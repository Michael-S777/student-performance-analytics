version: 2

models:
  - name: int_enrolments_enriched
    description: >
      Enrolment records enriched with student and course context.
      One row per enrolment. Used by both mart models.
    columns:
      - name: enrolment_id
        tests: [unique, not_null]
      - name: student_id
        tests: [not_null]
      - name: course_id
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'completed', 'withdrawn']

  - name: int_grades_aggregated
    description: >
      Assessment grades rolled up to one row per enrolment.
      Calculates the weighted final score and overall letter grade.
    columns:
      - name: enrolment_id
        tests: [unique, not_null]
      - name: final_score
        tests: [not_null]
      - name: overall_grade
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['HD', 'D', 'C', 'P', 'F']
      - name: is_passing
        tests: [not_null]
