version: 2

models:
  - name: int_enrolments_enriched
    description: >
      Enrolment records enriched with student and course context.
      One row per enrolment. Used by both mart models.
    columns:
      - name: enrolment_id
        data_tests: [unique, not_null]
      - name: student_id
        data_tests: [not_null]
      - name: course_id
        data_tests: [not_null]
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['active', 'completed', 'withdrawn']

  - name: int_grades_aggregated
    description: >
      Assessment grades rolled up to one row per enrolment.
      Calculates the weighted final score and overall letter grade.
    columns:
      - name: enrolment_id
        data_tests: [unique, not_null]
      - name: final_score
        data_tests: [not_null]
      - name: overall_grade
        data_tests:
          - not_null
          - accepted_values:
              values: ['HD', 'D', 'C', 'P', 'F']
      - name: is_passing
        data_tests: [not_null]
