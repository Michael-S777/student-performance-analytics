version: 2

models:

  - name: dim_students
    description: >
      Student dimension table with lifetime academic performance metrics
      and academic standing classification. One row per student.
    columns:
      - name: student_id
        description: "Primary key — unique student identifier"
        data_tests: [unique, not_null]
      - name: full_name
        data_tests: [not_null]
      - name: email
        data_tests: [unique, not_null]
      - name: program
        data_tests: [not_null]
      - name: academic_standing
        data_tests:
          - not_null
          - accepted_values:
              values: ['High Distinction', 'Distinction', 'Credit', 'Pass', 'At Risk', 'No Grade Yet']
      - name: is_at_risk
        data_tests: [not_null]
      - name: credits_earned
        data_tests: [not_null]

  - name: fct_enrolments
    description: >
      Enrolments fact table with one row per enrolment.
      Includes grade outcomes, student context, and course details
      for full analytics and BI reporting.
    columns:
      - name: enrolment_id
        description: "Primary key — unique enrolment identifier"
        data_tests: [unique, not_null]
      - name: student_id
        data_tests: [not_null]
      - name: course_id
        data_tests: [not_null]
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['active', 'completed', 'withdrawn']
      - name: is_completed
        data_tests: [not_null]
      - name: credits_earned
        data_tests: [not_null]
