name: 'student_performance_analytics'
version: '1.0.0'
config-version: 2

profile: 'student_performance_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  student_performance_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      students:
        +schema: marts
      courses:
        +schema: marts

seeds:
  student_performance_analytics:
    +schema: raw
